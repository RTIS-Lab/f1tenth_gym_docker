services:
  sim:
    build: ./f1tenth_gym_ros
    volumes:
      - ./f1tenth_gym_ros:/sim_ws/src/f1tenth_gym_ros
      - /dev/input:/dev/input:ro
      # Bind the X11 socket from the host
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XDG_RUNTIME_DIR}/pipewire-0:/tmp/pipewire-0
    environment:
      # Tell apps inside the container where to find the X11 display
      - XDG_RUNTIME_DIR=/tmp
      - DISPLAY=${DISPLAY}
      # use software rendering to avoid GPU issues
      - LIBGL_ALWAYS_SOFTWARE=1
    stdin_open: true
    tty: true
    privileged: true


  # for X11 forwarding, run `xhost local:docker` on the host first
  driver:
    build: ./f1tenth_drive
    volumes:
        - ./f1tenth_drive/src:/f1tenth_drive/src
        - ./f1tenth_drive/results:/f1tenth_drive/results
        - ./f1tenth_gym_ros:/f1tenth_gym_ros
        # Bind the X11 socket from the host
        - /tmp/.X11-unix:/tmp/.X11-unix
        - ${XDG_RUNTIME_DIR}/pipewire-0:/tmp/pipewire-0
        - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
        # Tell apps inside the container where to find the X11 display
        - XDG_RUNTIME_DIR=/tmp
        - DISPLAY=${DISPLAY}
        # Force Intel GPU usage
        - LIBGL_ALWAYS_INDIRECT=0
        - DRI_PRIME=0
    ports:
     - "2222:22"  # Map container's SSH port to host port 2222
    stdin_open: true
    tty: true
    privileged: true
    pid: host
    cgroup: "host"
